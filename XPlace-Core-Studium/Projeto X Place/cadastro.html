<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPLACE - Sign In</title>
    <link rel="stylesheet" href="login.css">
    <script src="cadastro.js" defer></script>
</head>

<body>

    <div class="container">

        <img src="logo.png" class="logo" alt="XPLACE">

        <div class="card">
            <h1>Cadastrar</h1>

            <label for="nome">Nome:</label>
            <input type="text" id="nome">

            <label for="email">Email:</label>
            <input type="email" id="email">

            <label for="senha">Senha:</label>
            <input type="password" id="senha">

            <label for="confirmar">Confirmar senha:</label>
            <input type="password" id="confirmar">

            <!-- Termos e Condições -->
            <div class="terms">
                <label class="terms-box">
                    <input type="checkbox" id="tc">
                    <span>
                        Concordo com os
                        <a href="#" class="terms-link">Termos e Condições</a>
                        e com a
                        <a href="#" class="terms-link">Política de Privacidade</a>.
                    </span>
                </label>
            </div>

            <button class="btn">Criar conta</button>

            <div class="links">
                <a href="login.html">Já tenho conta</a>
            </div>
        </div>

    </div>

    <!-- Notificação de erro -->
    <div id="notify" class="notify">
        <div class="loader"></div>
        <span id="notifyText">Preencha todos os campos obrigatórios.</span>
    </div>


    <!-- Alert de sucesso -->
    <div id="popup" class="popup">
        <div class="popup-box">
            <h2>Conta criada!</h2>
            <p>Seu cadastro foi concluído com sucesso.</p>
            <button id="popupBtn">OK</button>
        </div>
    </div>


</body>

</html>
